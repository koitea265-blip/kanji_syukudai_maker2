<!DOCTYPE html>
<html lang="ja">
<head>

  <title>漢字宿題用プリントメーカー２（低学年）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap');
    
    body {
      font-family: 'Klee One', "UD Digi Kyokasho NK-R", "Yu Mincho", serif;
      background-color: #f9fafb;
    }
    
    /* 縦書き用の設定 */
    .vertical-rl {
      writing-mode: vertical-rl;
      text-orientation: upright;
    }
    .horizontal-tb {
      writing-mode: horizontal-tb;
    }
    
    /* --- A4横向きの厳密な印刷設定 --- */
    @media print {
      @page {
        size: A4 landscape; /* A4 横向きに設定 */
        margin: 0;
      }
      body {
        background-color: white;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .no-print {
        display: none !important;
      }
      /* 印刷プレビュー領域をA4横用紙全体に広げる */
      .print-container {
        box-shadow: none !important;
        margin: 0 !important;
        width: 297mm !important; /* 横幅 */
        height: 210mm !important; /* 高さ */
        border: none !important;
        padding: 0 !important;
        overflow: hidden !important;
      }
      #app > div > div:nth-child(2) {
        overflow: visible !important;
      }
      #print-container {
        transform: none !important; /* 印刷時はスケールを解除 */
      }
    }
    
    /* --- マス目のデザイン (点線の十字リーダー) --- */
    .masu::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      border-top: 1px dashed #bbb;
      pointer-events: none;
      z-index: 1;
    }
    .masu::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      border-left: 1px dashed #bbb;
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>

    // --- 状態管理 ---

    };

    function saveState() {
      localStorage.setItem('kanjiGrade_v10', state.grade.toString());
      localStorage.setItem('kanjiStock1_v10', JSON.stringify(state.stock1));

    // ★ KanjiVGのSVGデータをキャッシュするオブジェクト
    const kanjiVGCache = {};

    // ★ KanjiVGのデータを取得して描画する関数
    async function loadKanjiVG() {
      const containers = document.querySelectorAll('.kanjivg-container');
      
      for (let container of containers) {
        const char = container.dataset.char;
        if (!char) continue;

        // すでに取得済みの場合はキャッシュから表示
        if (kanjiVGCache[char]) {
          container.innerHTML = kanjiVGCache[char];
          continue;
        }

        // 漢字のUnicodeを取得し、KanjiVGのURLを作成 (例: "一" -> 04e00.svg)
        const code = char.charCodeAt(0).toString(16).padStart(5, '0');
        const url = `https://cdn.jsdelivr.net/gh/KanjiVG/kanjivg@master/kanji/${code}.svg`;

        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error('KanjiVG Network Error');
          const svgText = await response.text();
          
          // SVGをパースして中身を編集する
          const parser = new DOMParser();
          const doc = parser.parseFromString(svgText, "image/svg+xml");
          const svgEl = doc.querySelector('svg');
          
          if (svgEl) {
            svgEl.setAttribute('width', '100%');
            svgEl.setAttribute('height', '100%');
            
            // 筆順の数字（StrokeNumbers）を赤色の「丸数字」に変換
            const numbersGroup = doc.querySelector('[id^="kvg:StrokeNumbers"]');
            if (numbersGroup) {
              // 丸数字を少し小さく(8px)、赤く、少し太く調整
              numbersGroup.setAttribute('style', 'font-size:8px; fill:#ef4444; font-family:sans-serif; font-weight:bold;');
              const texts = numbersGroup.querySelectorAll('text');
              
              texts.forEach(t => {
                const num = parseInt(t.textContent);
                if (!isNaN(num) && num >= 1 && num <= 20) {
                  // 丸数字のUnicode(①は0x2460)に変換
                  t.textContent = String.fromCharCode(0x2460 + num - 1);
                }
              });
            }
            
            kanjiVGCache[char] = svgEl.outerHTML;
            container.innerHTML = kanjiVGCache[char];
          }
        } catch (err) {
          console.warn(`KanjiVGの取得に失敗しました: ${char}`, err);
          // 取得失敗時は通常のテキストを表示
          kanjiVGCache[char] = `<span class="text-[40mm] font-normal leading-none text-black" style="font-family: 'Klee One', serif; transform: translateY(-2mm);">${char}</span>`;
          container.innerHTML = kanjiVGCache[char];
        }
      }
    }

    // --- UI レンダリング関数群 ---

            <div class="flex bg-gray-100 p-1 rounded-lg">
              <button onclick="changeNazoriPosition('left')" class="flex-1 py-2 rounded-md font-bold transition-all ${state.nazoriPosition === 'left' ? 'bg-white shadow text-sky-600' : 'text-gray-500 hover:bg-gray-200'}">左側（推奨）</button>
              <button onclick="changeNazoriPosition('right')" class="flex-1 py-2 rounded-md font-bold transition-all ${state.nazoriPosition === 'right' ? 'bg-white shadow text-sky-600' : 'text-gray-500 hover:bg-gray-200'}">右側</button>

              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>

    // 3. プリント領域 (A4横、5文字、なぞり1列・うつし1列)
    function renderPrintLayout() {
      const data = state.grade === 1 ? state.stock1 : state.stock2;
      const targetItem = data.find(item => item.id === state.printId) || data[0];
      
      if (!targetItem) return `<div class="flex items-center justify-center h-full text-gray-400">データがありません</div>`;

      const grade = state.grade;
      const words = [...targetItem.words];
      while(words.length < 5) words.push(""); // 常に5文字分確保

      const nameColTitle = grade === 1 ? '一年生のかん字' : '二年生のかん字';
      
      // レイアウト設計 (A4横: 297mm x 210mm の中に収める)
      const rows = 5; // 5回練習
      const masuSize = 25; // 25mm角
      const headerHeight = 55; // 上の大きな漢字部分の高さ
      const midashiHeight = 7; // なぞりがき・うつしがきの見出し高さ
      
      const totalHeight = headerHeight + midashiHeight + (masuSize * rows); // 55 + 7 + 125 = 187mm
      const fontSizeNazori = 23; // なぞり書きの漢字サイズ
      const translateY = '1.5mm'; 
      const nameBoxHeight = masuSize * 3; // 名前枠は下から3マス分
      
      let wordBlocks = '';

      words.forEach((word, index) => {
        const char = word.charAt(0) || "";
        
        let nazoriRows = '';
        for(let i=0; i<rows; i++) {
           nazoriRows += `<div class="masu relative w-[${masuSize}mm] h-[${masuSize}mm] flex items-center justify-center border-b border-black last:border-b-0"><span class="relative z-10 text-[${fontSizeNazori}mm] text-gray-300 leading-none" style="transform: translateY(${translateY}); font-family: 'UD Digi Kyokasho NK-R', serif;">${char}</span></div>`;
        }
        
        let utsushiRows = '';
        for(let i=0; i<rows; i++) {
           utsushiRows += `<div class="masu relative w-[${masuSize}mm] h-[${masuSize}mm] flex items-center justify-center border-b border-black last:border-b-0"></div>`;
        }

        const borderLeft = index !== words.length - 1 ? 'border-l-[2px] border-black' : ''; 
        const blockWidth = masuSize * 2; // なぞり・うつしの2列のみ

        // なぞり書きの位置に応じた設定
        const isLeft = state.nazoriPosition === 'left';
        const col1Header = isLeft ? 'うつしがき' : 'なぞりがき';
        const col2Header = isLeft ? 'なぞりがき' : 'うつしがき';
        const col1Rows = isLeft ? utsushiRows : nazoriRows;
        const col2Rows = isLeft ? nazoriRows : utsushiRows;

        wordBlocks += `
          <div class="w-[${blockWidth}mm] flex flex-col ${borderLeft} bg-white box-border">
            <div class="h-[${headerHeight}mm] border-b-[2px] border-black relative box-border bg-white flex items-center justify-center">
              <!-- よみかた -->
              <div class="absolute top-1 right-1 bottom-1 flex flex-col items-center">
                <span class="text-[2.5mm] leading-none mb-1">よみかた</span>
                <span class="vertical-rl text-[4mm]">（</span>
                <span class="flex-1"></span>
                <span class="vertical-rl text-[4mm]">）</span>
              </div>
              
              <!-- ★ KanjiVG 描画用コンテナ -->
              <div class="kanjivg-container w-[45mm] h-[45mm] flex items-center justify-center" data-char="${char}">
                <!-- 読み込み中のフォールバックテキスト -->
                <span class="text-[40mm] font-normal leading-none text-gray-200" style="font-family: 'Klee One', serif; transform: translateY(-2mm);">${char}</span>
              </div>
            </div>
            <!-- カラム見出し -->
            <div class="h-[${midashiHeight}mm] flex flex-row-reverse border-b border-black bg-white">
               <div class="w-[${masuSize}mm] flex items-center justify-center text-[2.5mm] font-bold">${col1Header}</div>
               <div class="w-[${masuSize}mm] border-r border-black flex items-center justify-center text-[2.5mm] font-bold">${col2Header}</div>
            </div>
            <!-- マス目群 -->
            <div class="flex flex-row-reverse bg-white flex-1">
              <div class="flex flex-col">${col1Rows}</div>
              <div class="flex flex-col border-r border-black">${col2Rows}</div>
            </div>
          </div>
        `;
      });

      return `
        <div id="print-container" class="print-container bg-white box-border shadow-xl print:shadow-none flex items-center justify-center relative flex-shrink-0" style="width: 297mm; height: 210mm;">
          
          <div class="flex flex-row-reverse justify-center pt-[5mm]">
            
            <!-- 名前欄カラム -->
            <div class="w-[28mm] relative pl-[2mm]">
               <!-- テキスト部分 -->
               <div class="absolute top-0 left-[2mm] w-[26mm] flex flex-col items-center pt-[8mm]" style="bottom: ${nameBoxHeight}mm;">
                 <div class="text-[6.5mm] font-bold vertical-rl tracking-[0.3em]">${nameColTitle}</div>
                 <div class="flex-1"></div>
                 <div class="text-[6mm] flex flex-col items-center">
                    <span class="vertical-rl">（</span>
                    <span class="h-[15mm]"></span>
                    <span class="vertical-rl">）</span>
                    <span class="mt-1 vertical-rl">くみ</span>
                 </div>
                 <div class="flex-1"></div>
                 <div class="text-[6mm] flex flex-col items-center mb-[5mm]">
                    <span class="vertical-rl tracking-[0.2em] font-bold">なまえ</span>
                 </div>
               </div>
               <!-- 名前の長方形枠 (左側のボーダーも表示) -->
               <div class="absolute bottom-0 left-[2mm] w-[26mm] border-[2px] border-black box-border bg-white" style="height: ${nameBoxHeight}mm;"></div>
            </div>
            
            <!-- メインの表（漢字ブロック群） -->
            <div class="flex flex-row-reverse border-[2px] border-black bg-white box-content" style="height: ${totalHeight}mm;">
              ${wordBlocks}
            </div>
            
          </div>
        </div>
      `;
    }

    // 4. ストック編集テーブル (5列対応)
    function renderStockEditor(tabStr) {
      const isGrade1 = tabStr === 'stock1';
      const data = isGrade1 ? state.stock1 : state.stock2;
      const grade = isGrade1 ? 1 : 2;
      const cols = 5; // ★常に5文字
      
      const headers = Array.from({length: cols}).map((_, i) => 
        `<th class="p-3 font-bold text-center">文字 ${i + 1} ${i===0 ? '<br><span class="text-xs text-sky-600">(右)</span>' : ''}</th>`
      ).join('');

      const rows = data.map(item => `
        <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
          <td class="p-3 text-center font-bold text-gray-500">${item.id}</td>
          ${Array.from({length: cols}).map((_, i) => `
            <td class="p-2">
              <input type="text" 
                     class="border border-gray-300 rounded-lg px-2 py-2 w-full max-w-[80px] mx-auto block focus:outline-none focus:ring-2 focus:ring-sky-400 text-center font-bold text-xl" 
                     value="${item.words[i] || ''}" 
                     maxlength="1"
                     onchange="updateWord(${grade}, ${item.id}, ${i}, this.value)">
            </td>
          `).join('')}
          <td class="p-3 text-center">
            <button onclick="deleteWord(${grade}, ${item.id})" class="text-red-500 hover:text-red-700 hover:bg-red-50 px-3 py-1 rounded transition-colors">削除</button>
          </td>
        </tr>
      `).join('');

      return `
        <div class="p-4 md:p-8 w-full max-w-5xl mx-auto no-print">
          <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 gap-4">
            <h2 class="text-2xl font-bold text-gray-800 border-b-4 border-emerald-400 pb-2 inline-block">${grade}年生の文字ストック (5文字構成)</h2>
            <div class="flex flex-wrap gap-3">
              <button onclick="importCSV(${grade})" class="bg-blue-100 text-blue-700 border border-blue-300 px-4 py-2 rounded-full font-bold shadow-sm hover:bg-blue-200 transition-colors flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                CSV読込
              </button>
              <button onclick="exportCSV(${grade})" class="bg-indigo-100 text-indigo-700 border border-indigo-300 px-4 py-2 rounded-full font-bold shadow-sm hover:bg-indigo-200 transition-colors flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                CSV保存
              </button>
              <button onclick="addWord(${grade})" class="bg-emerald-500 text-white px-5 py-2 rounded-full font-bold shadow hover:bg-emerald-600 transition-colors flex items-center gap-2">
                <span>＋</span> 新しい行を追加
              </button>
            </div>
          </div>
          <div class="bg-white rounded-xl shadow-md overflow-x-auto border border-gray-100">
            <table class="w-full text-left border-collapse min-w-[700px]">
              <thead>
                <tr class="bg-sky-50 text-sky-800 border-b-2 border-sky-100">
                  <th class="p-3 w-16 text-center font-bold">番号</th>
                  ${headers}
                  <th class="p-3 w-24 text-center font-bold">操作</th>
                </tr>
              </thead>
              <tbody>
                ${rows.length > 0 ? rows : `<tr><td colSpan="${cols + 2}" class="text-center p-8 text-gray-400">データがありません</td></tr>`}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    // --- メインレンダリング処理 ---
    function render() {
      const app = document.getElementById('app');
      
      let content = '';
      if (state.activeTab === 'print') {
        content = `
          <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
            ${renderSettings()}
            <div id="preview-wrapper" class="flex-1 bg-gray-400 print:bg-white print:p-0 relative flex items-center justify-center overflow-hidden">
              ${renderPrintLayout()}
            </div>
          </div>
        `;
      } else {
        content = `
          <div class="flex-1 overflow-auto bg-gray-50">
            ${renderStockEditor(state.activeTab)}
          </div>
        `;
      }

      app.innerHTML = `
        <div class="h-screen flex flex-col overflow-hidden relative">
          ${renderTabs()}
          ${content}
          ${renderDeleteModal()} <!-- ★モーダルを描画 -->
        </div>
      `;
      
      if (state.activeTab === 'print') {
        // レンダリング直後にスケール計算とKanjiVGの読み込みを実行
        requestAnimationFrame(() => {
          adjustScale();
          loadKanjiVG();
        });
      }
    }

    // ★ 削除確認モーダルのレンダリング
    function renderDeleteModal() {
      if (!state.deleteModal.show) return '';
      
      return `
        <div class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50 backdrop-blur-sm transition-opacity">
          <div class="bg-white rounded-2xl shadow-2xl p-6 w-11/12 max-w-sm transform transition-all scale-100">
            <div class="flex items-center gap-3 mb-4">
              <div class="bg-red-100 p-2 rounded-full">
                <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
              </div>
              <h3 class="text-lg font-bold text-gray-800">削除の確認</h3>
            </div>
            <p class="text-gray-600 mb-6 pl-1">
              番号 <span class="font-bold text-gray-800">${state.deleteModal.id}</span> のデータを削除しますか？<br>
              <span class="text-sm text-gray-500">この操作は元に戻せません。</span>
            </p>
            <div class="flex justify-end gap-3">
              <button onclick="cancelDelete()" class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl hover:bg-gray-200 font-bold transition-colors">キャンセル</button>
              <button onclick="confirmDelete()" class="px-5 py-2.5 bg-red-500 text-white rounded-xl hover:bg-red-600 font-bold shadow-sm transition-colors flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                削除する
              </button>
            </div>
          </div>
        </div>
      `;
    }

    // --- プレビュー画面の自動リサイズ（スケール） ---
    function adjustScale() {
      const wrapper = document.getElementById('preview-wrapper');
      const container = document.getElementById('print-container');
      if (!wrapper || !container) return;

      // 印刷時は何もしない
      if (window.matchMedia('print').matches) return;

      const padding = 32; // 上下左右の余白
      const availableWidth = wrapper.clientWidth - padding;
      const availableHeight = wrapper.clientHeight - padding;
      
      const containerWidth = container.offsetWidth;
      const containerHeight = container.offsetHeight;

      if (containerWidth === 0 || containerHeight === 0) return;

      // 画面に収まる最適なスケール倍率を計算
      const scale = Math.min(availableWidth / containerWidth, availableHeight / containerHeight);

      container.style.transform = `scale(${scale})`;
      container.style.transformOrigin = 'center center';
    }

    // --- イベントハンドラ群 ---
    window.addEventListener('resize', adjustScale); // ウィンドウサイズ変更時に再計算

    window.changeTab = function(tab) {
      state.activeTab = tab;
      render();
    };

    window.changeGrade = function(grade) {
      state.grade = grade;
      const data = grade === 1 ? state.stock1 : state.stock2;
      state.printId = data[0] ? data[0].id : 1;
      saveState();
      render();
    };

    window.changeNazoriPosition = function(pos) {
      state.nazoriPosition = pos;
      saveState();
      render();
    };

    window.changePrintId = function(id) {
      state.printId = id;
      render();
    };

    window.updateWord = function(grade, id, index, value) {
      const data = grade === 1 ? state.stock1 : state.stock2;
      const item = data.find(d => d.id === id);
      if (item) {
        item.words[index] = value.charAt(0); // 1文字だけ保存
        saveState();
        render(); // 更新したらプレビューも即座に反映
      }
    };

    window.addWord = function(grade) {
      const data = grade === 1 ? state.stock1 : state.stock2;
      const newId = data.length > 0 ? Math.max(...data.map(d => d.id)) + 1 : 1;
      data.push({ id: newId, words: ["", "", "", "", ""] });
      saveState();
      render();
    };

    // ★ 削除ボタンを押した時（モーダルを表示）
    window.deleteWord = function(grade, id) {
      state.deleteModal = { show: true, grade, id };
      render();
    };

    // ★ モーダルで「削除する」を押した時
    window.confirmDelete = function() {
      const { grade, id } = state.deleteModal;
      if (grade === 1) {
        state.stock1 = state.stock1.filter(d => d.id !== id);
      } else {
        state.stock2 = state.stock2.filter(d => d.id !== id);
      }
      if (state.printId === id) state.printId = 1;
      state.deleteModal = { show: false, grade: null, id: null };
      saveState();
      render();
    };

    // ★ モーダルで「キャンセル」を押した時
    window.cancelDelete = function() {
      state.deleteModal = { show: false, grade: null, id: null };
      render();
    };

    window.importCSV = function(grade) {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.csv';
      input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const readCSV = (encoding) => {
          return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result);
            reader.onerror = (e) => reject(e);
            reader.readAsText(file, encoding);
          });
        };

        readCSV('Shift_JIS').then(text => {
          if (text.includes('')) {
            return readCSV('UTF-8');
          }
          return text;
        }).then(text => {
          const lines = text.split(/\r?\n/);
          const newData = [];
          let currentId = 1;
          const colsNum = 5; // 常に5列
          
          for (let line of lines) {
            if (!line.trim()) continue;
            const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
            
            let numIndex = -1;
            for (let i = 0; i < cols.length; i++) {
              if (cols[i] && !isNaN(parseInt(cols[i])) && parseInt(cols[i]) > 0 && parseInt(cols[i]) < 1000) {
                numIndex = i;
                break;
              }
            }
            
            if (numIndex !== -1 && cols.length >= numIndex + colsNum) {
              let extractedWords = [];
              for (let i = 0; i < colsNum; i++) {
                // 右詰めでデータを取得
                extractedWords.push(cols[numIndex + colsNum - i] || "");
              }
              
              if (extractedWords.some(w => w)) {
                newData.push({
                  id: currentId++,
                  words: extractedWords
                });
              }
            }
          }
          
          if (newData.length > 0) {
            if (confirm(`CSVから ${newData.length} 件のデータを読み込みました。\n\n[OK] 既存のデータをすべて「上書き（置き換え）」する\n[キャンセル] 既存のデータの末尾に「追加」する`)) {
              if (grade === 1) state.stock1 = newData;
              else state.stock2 = newData;
            } else {
              const targetStock = grade === 1 ? state.stock1 : state.stock2;
              let maxId = targetStock.length > 0 ? Math.max(...targetStock.map(d => d.id)) : 0;
              const appendedData = newData.map(d => ({...d, id: ++maxId}));
              if (grade === 1) state.stock1 = [...state.stock1, ...appendedData];
              else state.stock2 = [...state.stock2, ...appendedData];
            }
            saveState();
            render();
            alert('CSVの読み込みが完了しました。');
          } else {
            alert('CSVからデータを読み取れませんでした。\n番号の右隣に単語が並んでいる形式か確認してください。');
          }
        }).catch(err => {
          console.error("CSV読み込みエラー:", err);
          alert('CSVファイルの読み込みに失敗しました。');
        });
      };
      input.click();
    };

    // ★ CSVエクスポート処理
    window.exportCSV = function(grade) {
      const data = grade === 1 ? state.stock1 : state.stock2;
      if (data.length === 0) {
        alert("保存するデータがありません。");
        return;
      }

      // Excelで文字化けしないようにBOM(Byte Order Mark)を追加
      const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
      
      // ヘッダー行を作成
      let csvContent = "番号,文字1(右),文字2,文字3,文字4,文字5\n";

      // データを追加 (カンマや改行が含まれても大丈夫なようにダブルクォーテーションで囲む)
      data.forEach(item => {
        const row = [
          item.id,
          ...item.words
        ].map(val => `"${val || ''}"`).join(',');
        csvContent += row + "\n";
      });

      // Blobを作成してダウンロード
      const blob = new Blob([bom, csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.setAttribute('href', url);
      link.setAttribute('download', `${grade}年生_文字ストック.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    };

    // 初期化
    window.onload = render;
  </script>
</body>
</html>
